<!DOCTYPE html>
<html>

<head>
    <title>BondsHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- MOBILE NAVBAR -->
    <div class="mobile-topbar d-md-none">
        <button class="btn btn-dark" onclick="toggleSidebar()">☰</button>
        <span class="ms-2 text-white fw-bold">BondsHub</span>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4 class="p-3 text-white"><b>BondsHub</b></h4>
        <a href="/bonds">Bonds</a>
        <a href="/portfolio">Portfolio</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content p-4">
        {% block content %}{% endblock %}
    </div>

    <!-- TOGGLE SCRIPT -->
    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("show");
        }
    </script>

</body>

</html>
