<!DOCTYPE html>
<html>

<head>
    <title>BondsHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- MOBILE NAVBAR -->
    <div class="mobile-topbar d-md-none">
        <button class="btn btn-dark" onclick="toggleSidebar()">☰</button>
        <span class="ms-2 text-white fw-bold">BondsHub</span>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="p-3 text-white">
            <h4 class="mb-0"><b>BondsHub</b></h4>

            {% if session.get('user') %}
            <small class="text-light">
                Welcome, {{ session.get('user') }}
            </small>
            {% endif %}
        </div>
        <a href="/bonds">Bonds</a>
        <a href="/portfolio">Portfolio</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content p-4">

        <!-- FLASH ALERTS -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="alert alert-{{category}} alert-dismissible fade show auto-close">
            {{msg}}
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS (required for auto dismiss) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AUTO CLOSE FLASH -->
    <script>
        setTimeout(() => {
            document.querySelectorAll('.auto-close').forEach(alert => {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 4000); // 4 sec
    </script>

    <!-- TOGGLE SCRIPT -->
    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("show");
        }
    </script>

</body>

</html>
